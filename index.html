<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aplikasi Antrian & CSO CBT</title>
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Seal_of_the_Ministry_of_Finance_of_the_Republic_of_Indonesia.svg/960px-Seal_of_the_Ministry_of_Finance_of_the_Republic_of_Indonesia.svg.png" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow: hidden; /* Mencegah scroll ganda */
    }

    .iframe-container {
      width: 100%;
      height: 100dvh; /* Menggunakan dvh agar pas di mobile browser */
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbw_HNX9be1A79t7P7cfmFkVQKNXL_DNY8x33sP8dOugBAtn8bVg5jhTaIb93Kr5K4oc/exec"
      scrolling="yes"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation;">
    </iframe>
  </div>
</body>
</html>
